<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Check</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

.card-ui {
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 30px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 450px;
}

.form-control {
    border-radius: 10px;
}

#previewImg {
    display: none;
    margin: 10px auto;
    max-width: 100%;
    max-height: 150px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.btn-custom {
    border-radius: 10px;
}

.alert {
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="card-ui">

    <h3 class="text-center mb-3">🔍 Phishing Check</h3>
    <p class="text-center mb-4">Provide any details you have</p>

    <form id="checkForm" action="/check" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Email (optional)</label>
            <input type="email" name="Email" id="email" class="form-control" placeholder="Enter email">
        </div>

        <div class="mb-3">
            <label>URL (optional)</label>
            <input type="text" name="Url" id="url" class="form-control" placeholder="Enter URL">
        </div>

        <div class="mb-3">
            <label>Description (optional)</label>
            <textarea name="Description" id="description" class="form-control"
                rows="3" placeholder="Describe what happened..."></textarea>
        </div>

        <div class="mb-3">
            <label>Upload Image (optional)</label>
            <input type="file" name="Image" id="image" class="form-control" accept="image/*">
        </div>

        <img id="previewImg" alt="Preview">

        <div class="d-grid mt-3">
            <button id="submitBtn" type="submit" class="btn btn-primary btn-custom">
                Submit
            </button>
        </div>

    </form>

    <div id="msg" class="mt-3"></div>

    <div class="text-center mt-3">
        <a href="/home" class="text-light">⬅ Back</a>
    </div>

</div>

<script>
const form = document.getElementById("checkForm");
const btn = document.getElementById("submitBtn");
const msg = document.getElementById("msg");

// Image preview
document.getElementById("image").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const img = document.getElementById("previewImg");

    if (file) {
        img.src = URL.createObjectURL(file);
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
});

// Show message
function showMsg(type, text) {
    msg.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

// Validation: at least ONE field required
form.addEventListener("submit", (e) => {

    const email = document.getElementById("email").value.trim();
    const url = document.getElementById("url").value.trim();
    const desc = document.getElementById("description").value.trim();
    const image = document.getElementById("image").files.length;

    if (!email && !url && !desc && !image) {
        e.preventDefault();
        showMsg("danger", "⚠️ Please provide at least one input");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Submitting...";
});
</script>

</body>
</html>
